<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saha Pro | Dayı Asistanı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #030303; color: #ffffff; margin: 0; padding-bottom: 90px; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        .slide-down { animation: slideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { 0% { transform: translateY(-100%); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        // --- FIREBASE AYARLARI BURAYA GELECEK ---
        const firebaseConfig = {
            apiKey: "BURAYA_API_KEY_GELECEK",
            authDomain: "BURAYA_AUTH_DOMAIN_GELECEK",
            projectId: "BURAYA_PROJECT_ID_GELECEK",
            storageBucket: "BURAYA_STORAGE_BUCKET_GELECEK",
            messagingSenderId: "BURAYA_MESSAGING_SENDER_ID_GELECEK",
            appId: "BURAYA_APP_ID_GELECEK"
        };
        
        // Sadece kendi bilgilerini girdiğinde Firebase aktif olsun diye basit bir kontrol:
        let auth = null;
        let provider = null;
        if (firebaseConfig.apiKey !== "BURAYA_API_KEY_GELECEK") {
            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            provider = new firebase.auth.GoogleAuthProvider();
        }

        const { useState, useEffect } = React;

        function App() {
            // Google Giriş Stateleri
            const [kullanici, setKullanici] = useState(null);
            const [girisYukleniyor, setGirisYukleniyor] = useState(true);

            // Uygulama Stateleri
            const [aktifSekme, setAktifSekme] = useState('ozet');
            const [kisiler, setKisiler] = useState([]);
            const [islemler, setIslemler] = useState([]);
            const [notlar, setNotlar] = useState([]);
            const [hatirlaticilar, setHatirlaticilar] = useState([]);
            
            const [seciliKisi, setSeciliKisi] = useState(null);
            const [islemTipi, setIslemTipi] = useState('borc');
            const [hesapAcik, setHesapAcik] = useState(false);
            const [hesapEkrani, setHesapEkrani] = useState('');
            const [gorselModal, setGorselModal] = useState(null);
            const [odemeModal, setOdemeModal] = useState(null);

            const [motivasyon, setMotivasyon] = useState({ goster: false, metin: '' });
            const sozler = [
                "Senin gibi karizma ve vizyonlu biriyle çalışmak harika!",
                "Allah zorluk verdiyse kolaylığını da verir dayı.",
                "Allah işine kolaylık, kasana bereket versin.",
                "Rızkı veren Allah'tır, bugün de işin rast gitsin."
            ];

            const bugun = new Date().toISOString().split('T')[0];

            // Firebase Oturum Kontrolü
            useEffect(() => {
                if (auth) {
                    const unsubscribe = auth.onAuthStateChanged((user) => {
                        setKullanici(user);
                        setGirisYukleniyor(false);
                    });
                    return () => unsubscribe();
                } else {
                    // Eğer API key girilmediyse, test edebilmen için girişi otomatik atlar
                    setGirisYukleniyor(false);
                    setKullanici({ displayName: "Test Kullanıcısı" }); 
                }
            }, []);
            useEffect(() => {
                if (!kullanici) return;

                const hazirDukkanlar = Array.from({ length: 120 }, (_, i) => ({
                    id: 'dukkan_' + (i + 1),
                    ad: `Hal No: ${i + 1}`,
                    sabit: true
                }));

                const userPrefix = kullanici.uid ? `_${kullanici.uid}` : '';
                const k = localStorage.getItem(`saha_kisiler_v7${userPrefix}`);
                const i = localStorage.getItem(`saha_islemler_v7${userPrefix}`);
                const n = localStorage.getItem(`saha_notlar_v7${userPrefix}`);
                const h = localStorage.getItem(`saha_hatirlaticilar_v7${userPrefix}`);
                
                if(k) setKisiler(JSON.parse(k)); else setKisiler(hazirDukkanlar);
                if(i) setIslemler(JSON.parse(i));
                if(n) setNotlar(JSON.parse(n));
                if(h) setHatirlaticilar(JSON.parse(h));
            }, [kullanici]);

            useEffect(() => {
                if (!kullanici) return;
                const userPrefix = kullanici.uid ? `_${kullanici.uid}` : '';
                if(kisiler.length > 0) localStorage.setItem(`saha_kisiler_v7${userPrefix}`, JSON.stringify(kisiler));
                localStorage.setItem(`saha_islemler_v7${userPrefix}`, JSON.stringify(islemler));
                localStorage.setItem(`saha_notlar_v7${userPrefix}`, JSON.stringify(notlar));
                localStorage.setItem(`saha_hatirlaticilar_v7${userPrefix}`, JSON.stringify(hatirlaticilar));
            }, [kisiler, islemler, notlar, hatirlaticilar, kullanici]);

            useEffect(() => {
                if ('Notification' in window && Notification.permission === 'granted' && kullanici) {
                    const simdi = new Date().getTime();
                    islemler.forEach(islem => {
                        if (islem.kalan > 0 && islem.vade) {
                            const vadeZamani = new Date(islem.vade).getTime();
                            const farkGun = Math.ceil((vadeZamani - simdi) / (1000 * 60 * 60 * 24));
                            if (farkGun <= 7 && farkGun >= 0) {
                                const anahtar = `uyari_${islem.id}_${farkGun}`;
                                if (!localStorage.getItem(anahtar)) {
                                    const dukkan = kisiler.find(k => k.id === islem.kisiId)?.ad || 'Bilinmeyen';
                                    const msg = islem.tip === 'borc' ? 'Ödemeniz' : 'Tahsilatınız';
                                    new Notification("Saha Pro Hatırlatıcı", {
                                        body: `${dukkan} dükkanına ${msg} için ${farkGun} gün kaldı! Tutar: ${islem.kalan} TL`
                                    });
                                    localStorage.setItem(anahtar, 'true');
                                }
                            }
                        }
                    });
                }
            }, [islemler, kisiler, kullanici]);

            useEffect(() => {
                if (aktifSekme === 'gunluk' && kullanici) {
                    const ctx = document.getElementById('kazancGrafik');
                    if (ctx) {
                        if (window.kazancChart) window.kazancChart.destroy();
                        const grafikVeri = [...notlar].reverse().slice(-7);
                        window.kazancChart = new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: grafikVeri.map(n => n.tarih.slice(5)),
                                datasets: [{
                                    label: 'Günlük Kazanç',
                                    data: grafikVeri.map(n => Number(n.kazanc)),
                                    borderColor: '#10b981',
                                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                                    borderWidth: 3,
                                    tension: 0.4,
                                    fill: true
                                }]
                            },
                            options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } } } }
                        });
                    }
                }
            }, [aktifSekme, notlar, kullanici]);

            const girisYap = () => {
                if(auth && provider) {
                    auth.signInWithPopup(provider).catch(err => alert("Giriş Hatası: " + err.message));
                } else {
                    alert("Firebase bilgileri girilmemiş! Lütfen kodun en üstündeki apiKey kısımlarını doldurun.");
                }
            };

            const cikisYap = () => {
                if(auth) auth.signOut();
                else setKullanici(null);
            };

            const formatPara = (m) => new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY', maximumFractionDigits: 0 }).format(m || 0);

            const hesaplaTus = (tus) => {
                if(tus === 'C') setHesapEkrani('');
                else if(tus === '=') { try { setHesapEkrani(eval(hesapEkrani).toString()); } catch { setHesapEkrani('Hata'); } } 
                else setHesapEkrani(hesapEkrani + tus);
            };
            const makbuzPDFIndir = (islem, dukkanAd) => {
                const element = document.createElement('div');
                element.innerHTML = `
                    <div style="padding: 30px; font-family: Arial, sans-serif; color: black; background: white; width: 400px; border: 2px solid #333; border-radius: 10px;">
                        <h1 style="text-align: center; color: #4f46e5; margin-bottom: 5px;">SAHA PRO TİCARİ</h1>
                        <p style="text-align: center; font-size: 14px; color: gray; margin-top: 0;">Resmi Olmayan Bilgi Makbuzu</p>
                        <hr style="margin: 20px 0; border: 1px solid #ccc;">
                        <p style="font-size: 16px;"><strong>İşlem Tarihi:</strong> ${islem.tarih}</p>
                        <p style="font-size: 16px;"><strong>Firma / Dükkan:</strong> ${dukkanAd}</p>
                        <p style="font-size: 16px;"><strong>İşlem Türü:</strong> ${islem.tip === 'borc' ? 'Borç / Alınan Mal' : 'Alacak / Verilen Mal'}</p>
                        <p style="font-size: 16px;"><strong>Açıklama:</strong> ${islem.aciklama || 'Belirtilmedi'}</p>
                        <hr style="margin: 20px 0; border: 1px solid #ccc;">
                        <h2 style="text-align: right; color: ${islem.tip === 'borc' ? '#dc2626' : '#16a34a'};">Asıl Tutar: ${formatPara(islem.miktar)}</h2>
                        <h2 style="text-align: right; color: #333;">Kalan Bakiye: ${formatPara(islem.kalan)}</h2>
                        <p style="text-align: center; font-size: 10px; margin-top: 40px; color: #888;">Bu makbuz dijital asistan tarafından otomatik oluşturulmuştur.</p>
                    </div>
                `;
                html2pdf().set({ margin: 1, filename: `Makbuz_${dukkanAd}_${islem.tarih}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a5', orientation: 'portrait' } }).from(element).save();
            };

            const whatsappGonder = (islem, dukkanAd) => {
                const metin = `*SAHA PRO BİLGİLENDİRME*%0A%0A*Firma:* ${dukkanAd}%0A*Tarih:* ${islem.tarih}%0A*İşlem:* ${islem.tip === 'borc' ? 'Borç' : 'Alacak'}%0A*Açıklama:* ${islem.aciklama || '-'}%0A*Asıl Tutar:* ${islem.miktar} TL%0A*Kalan Bakiye:* ${islem.kalan} TL%0A%0A_Sistem tarafından otomatik gönderilmiştir._`;
                window.open(`https://wa.me/?text=${metin}`, '_blank');
            };

            const fotografYukle = (e, callback) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = () => callback(reader.result);
                reader.readAsDataURL(file);
            };

            // YÜKLENİYOR EKRANI
            if (girisYukleniyor) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#030303]">
                        <div className="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                    </div>
                );
            }

            // GOOGLE GİRİŞ EKRANI
            if (!kullanici) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden fade-in bg-[#030303]">
                        <div className="absolute top-1/4 -left-10 w-64 h-64 bg-indigo-600/30 rounded-full blur-3xl"></div>
                        <div className="absolute bottom-1/4 -right-10 w-64 h-64 bg-emerald-600/20 rounded-full blur-3xl"></div>
                        
                        <div className="glass-panel p-10 rounded-[3rem] w-full max-w-sm text-center relative z-10 shadow-2xl border border-white/10">
                            <div className="w-24 h-24 bg-indigo-600/20 rounded-full flex items-center justify-center mx-auto mb-6 border border-indigo-500/30">
                                <i className="fa-solid fa-shield-halved text-4xl text-indigo-400"></i>
                            </div>
                            <h1 className="text-3xl font-black italic uppercase tracking-tighter mb-2 text-white">Saha Pro</h1>
                            <p className="text-sm text-gray-400 font-bold mb-10">Lütfen güvenli giriş yapın.</p>
                            
                            <button onClick={girisYap} className="w-full bg-white text-black py-4 rounded-2xl font-black uppercase tracking-widest active:scale-95 transition-transform flex items-center justify-center gap-3">
                                <i className="fa-brands fa-google text-xl text-red-500"></i> Google ile Gir
                            </button>
                        </div>
                    </div>
                );
            }

            // ANA UYGULAMA HESAPLAMALARI
            const aktifBorclar = islemler.filter(i => i.tip === 'borc' && i.kalan > 0);
            const aktifAlacaklar = islemler.filter(i => i.tip === 'alacak' && i.kalan > 0);
            const toplamBorc = aktifBorclar.reduce((a,b) => a + Number(b.kalan), 0);
            const toplamAlacak = aktifAlacaklar.reduce((a,b) => a + Number(b.kalan), 0);
            const aktifAlarmlar = hatirlaticilar.filter(h => h.tarih <= bugun);

            return (
                <div className="min-h-screen relative overflow-hidden">
                    {motivasyon.goster && motivasyon.metin && (
                        <div className="fixed top-0 left-0 right-0 bg-emerald-600 text-white z-[999] p-6 text-center slide-down shadow-[0_20px_40px_rgba(16,185,129,0.3)]">
                            <p className="font-black text-sm uppercase tracking-widest">{motivasyon.metin}</p>
                        </div>
                    )}

                    <header className="px-6 py-6 border-b border-white/5 sticky top-0 bg-[#030303]/90 backdrop-blur-xl z-40 shadow-2xl flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-black text-indigo-500 italic uppercase tracking-tighter">Saha Pro</h1>
                            <p className="text-[9px] text-gray-500 font-bold uppercase tracking-[0.3em] mt-1">Hoşgeldin, {kullanici.displayName ? kullanici.displayName.split(' ')[0] : 'Dayı'}</p>
                        </div>
                        <button onClick={cikisYap} className="w-10 h-10 bg-red-500/10 rounded-full flex items-center justify-center border border-red-500/20 active:scale-90">
                            <i className="fa-solid fa-arrow-right-from-bracket text-red-400"></i>
                        </button>
                    </header>

                    <main className="p-5 space-y-6 relative z-10">
                        {aktifSekme === 'ozet' && (
                            <div className="space-y-6 fade-in pt-2">
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="glass-panel p-6 rounded-[2rem] relative overflow-hidden">
                                        <div className="absolute -top-10 -right-10 w-24 h-24 bg-red-500/20 rounded-full blur-2xl"></div>
                                        <i className="fa-solid fa-arrow-up-right-dots text-red-500 text-3xl mb-3"></i>
                                        <p className="text-[10px] text-gray-400 font-black uppercase tracking-widest">Kalan Borcum</p>
                                        <p className="text-xl font-black text-white mt-1">{formatPara(toplamBorc)}</p>
                                    </div>
                                    <div className="glass-panel p-6 rounded-[2rem] relative overflow-hidden">
                                        <div className="absolute -top-10 -right-10 w-24 h-24 bg-emerald-500/20 rounded-full blur-2xl"></div>
                                        <i className="fa-solid fa-arrow-down-to-line text-emerald-500 text-3xl mb-3"></i>
                                        <p className="text-[10px] text-gray-400 font-black uppercase tracking-widest">Kalan Alacağım</p>
                                        <p className="text-xl font-black text-white mt-1">{formatPara(toplamAlacak)}</p>
                                    </div>
                                </div>
                                {aktifAlarmlar.length > 0 && (
                                    <div className="bg-indigo-500/10 border border-indigo-500/30 p-5 rounded-[2rem]">
                                        <h3 className="text-indigo-400 font-black text-xs uppercase tracking-widest mb-4 flex items-center gap-2"><i className="fa-solid fa-bell animate-pulse"></i> Aktif Hatırlatmalar</h3>
                                        <div className="space-y-3">
                                            {aktifAlarmlar.map(h => (
                                                <div key={h.id} className="bg-black/50 p-4 rounded-2xl border border-white/5 flex justify-between items-center">
                                                    <span className="font-bold text-white text-sm">{h.baslik}</span>
                                                    <button onClick={() => setHatirlaticilar(hatirlaticilar.filter(x => x.id !== h.id))} className="w-8 h-8 bg-indigo-500/20 text-indigo-400 rounded-full flex items-center justify-center"><i className="fa-solid fa-check"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                
                                <button onClick={() => setAktifSekme('defter')} className="w-full glass-panel p-6 rounded-[2rem] flex items-center justify-between group active:scale-95 transition-all">
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 bg-indigo-500/20 rounded-full flex items-center justify-center border border-indigo-500/30"><i className="fa-solid fa-book-open text-indigo-400 text-xl"></i></div>
                                        <div className="text-left">
                                            <h3 className="text-white font-black text-lg">Ayrıntılı Defter</h3>
                                            <p className="text-[10px] text-gray-400 uppercase tracking-widest mt-1">Borç ve Alacak Listesi</p>
                                        </div>
                                    </div>
                                    <i className="fa-solid fa-chevron-right text-gray-500"></i>
                                </button>
                            </div>
                        )}

                        {aktifSekme === 'defter' && (
                            <div className="space-y-6 fade-in pt-2">
                                <div className="flex justify-between items-center glass-panel p-4 rounded-[1.5rem]">
                                    <button onClick={() => setAktifSekme('ozet')} className="text-[10px] font-black text-gray-400 uppercase tracking-widest bg-black/50 px-4 py-2 rounded-xl"><i className="fa-solid fa-chevron-left mr-2"></i> Geri</button>
                                    <h2 className="text-lg font-black text-white uppercase tracking-tighter">Defter Listesi</h2>
                                </div>

                                <div className="space-y-6">
                                    <div className="glass-panel p-5 rounded-[2rem] border-red-500/20">
                                        <h3 className="text-xs font-black text-red-500 uppercase tracking-widest mb-4 flex items-center gap-2"><i className="fa-solid fa-hand-holding-dollar"></i> Ödemem Gerekenler (Borçlarım)</h3>
                                        <div className="space-y-3">
                                            {aktifBorclar.map(i => {
                                                const dukkan = kisiler.find(k => k.id === i.kisiId);
                                                return (
                                                    <div key={i.id} onClick={() => {setSeciliKisi(dukkan); setAktifSekme('kisiler'); setIslemTipi('borc');}} className="bg-black/50 p-4 rounded-2xl border border-white/5 flex justify-between items-center cursor-pointer">
                                                        <div>
                                                            <p className="font-bold text-white text-sm">{dukkan?.ad}</p>
                                                            <p className="text-[9px] text-gray-500 uppercase mt-1">Vade: {i.vade || 'Belirtilmedi'}</p>
                                                        </div>
                                                        <span className="font-black text-red-400">{formatPara(i.kalan)}</span>
                                                    </div>
                                                );
                                            })}
                                            {aktifBorclar.length === 0 && <p className="text-[10px] text-gray-600 font-bold uppercase py-2">Borç kaydı yok.</p>}
                                        </div>
                                    </div>

                                    <div className="glass-panel p-5 rounded-[2rem] border-emerald-500/20">
                                        <h3 className="text-xs font-black text-emerald-500 uppercase tracking-widest mb-4 flex items-center gap-2"><i className="fa-solid fa-sack-dollar"></i> Tahsil Edeceklerim (Alacaklarım)</h3>
                                        <div className="space-y-3">
                                            {aktifAlacaklar.map(i => {
                                                const dukkan = kisiler.find(k => k.id === i.kisiId);
                                                return (
                                                    <div key={i.id} onClick={() => {setSeciliKisi(dukkan); setAktifSekme('kisiler'); setIslemTipi('alacak');}} className="bg-black/50 p-4 rounded-2xl border border-white/5 flex justify-between items-center cursor-pointer">
                                                        <div>
                                                            <p className="font-bold text-white text-sm">{dukkan?.ad}</p>
                                                            <p className="text-[9px] text-gray-500 uppercase mt-1">Vade: {i.vade || 'Belirtilmedi'}</p>
                                                        </div>
                                                        <span className="font-black text-emerald-400">{formatPara(i.kalan)}</span>
                                                    </div>
                                                );
                                            })}
                                            {aktifAlacaklar.length === 0 && <p className="text-[10px] text-gray-600 font-bold uppercase py-2">Alacak kaydı yok.</p>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {aktifSekme === 'kisiler' && !seciliKisi && (
                            <div className="space-y-6 fade-in pt-2">
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const ad = e.target.ad.value;
                                    setKisiler([{ id: Date.now(), ad, sabit: false }, ...kisiler]);
                                    e.target.reset();
                                }} className="glass-panel p-5 rounded-[2rem] flex gap-3">
                                    <input name="ad" placeholder="Özel Dükkan/Kişi Ekle" className="w-full bg-black/50 border border-white/10 rounded-2xl p-4 text-sm font-bold outline-none text-white focus:border-indigo-500" required />
                                    <button type="submit" className="bg-indigo-600 text-white px-6 rounded-2xl font-black active:scale-95"><i className="fa-solid fa-plus"></i></button>
                                </form>

                                <div className="space-y-3">
                                    {kisiler.map(k => {
                                        const kisiBorc = islemler.filter(i => i.kisiId === k.id && i.tip === 'borc').reduce((a,b) => a + Number(b.kalan), 0);
                                        const kisiAlacak = islemler.filter(i => i.kisiId === k.id && i.tip === 'alacak').reduce((a,b) => a + Number(b.kalan), 0);
                                        return (
                                            <div key={k.id} onClick={() => setSeciliKisi(k)} className="glass-panel p-5 rounded-[2rem] flex justify-between items-center cursor-pointer hover:bg-white/5 group">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-12 h-12 bg-black/50 rounded-full flex items-center justify-center border border-white/5"><i className="fa-solid fa-store text-gray-400"></i></div>
                                                    <h3 className="font-black text-white text-sm">{k.ad}</h3>
                                                </div>
                                                <div className="text-right flex flex-col gap-1">
                                                    {kisiBorc > 0 && <span className="text-[9px] font-black text-red-400 bg-red-500/10 px-2 py-1 rounded-md">Borç: {formatPara(kisiBorc)}</span>}
                                                    {kisiAlacak > 0 && <span className="text-[9px] font-black text-emerald-400 bg-emerald-500/10 px-2 py-1 rounded-md">Alacak: {formatPara(kisiAlacak)}</span>}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                        {aktifSekme === 'kisiler' && seciliKisi && (
                            <div className="space-y-6 fade-in pt-2">
                                <div className="flex justify-between items-center glass-panel p-4 rounded-[1.5rem]">
                                    <button onClick={() => setSeciliKisi(null)} className="text-[10px] font-black text-gray-400 uppercase tracking-widest bg-black/50 px-4 py-2 rounded-xl"><i className="fa-solid fa-chevron-left mr-2"></i> Geri</button>
                                    <h2 className="text-lg font-black text-white uppercase tracking-tighter truncate max-w-[150px]">{seciliKisi.ad}</h2>
                                </div>

                                <div className="flex bg-black/60 rounded-[1.5rem] p-1.5 border border-white/10">
                                    <button onClick={() => setIslemTipi('borc')} className={`flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all ${islemTipi === 'borc' ? 'bg-red-600 text-white' : 'text-gray-500'}`}>BENİM BORCUM</button>
                                    <button onClick={() => setIslemTipi('alacak')} className={`flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all ${islemTipi === 'alacak' ? 'bg-emerald-600 text-white' : 'text-gray-500'}`}>ALACAĞIM</button>
                                </div>

                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fotoInp = e.target.foto;
                                    const yeniIslem = {
                                        id: Date.now(), kisiId: seciliKisi.id, tip: islemTipi,
                                        miktar: Number(e.target.miktar.value), kalan: Number(e.target.miktar.value),
                                        aciklama: e.target.aciklama.value, tarih: e.target.tarih.value, vade: e.target.vade.value, odemeler: []
                                    };
                                    const kaydet = (fotoBas64) => { yeniIslem.foto = fotoBas64; setIslemler([yeniIslem, ...islemler]); e.target.reset(); };
                                    if(fotoInp.files && fotoInp.files[0]) { fotografYukle({target: fotoInp}, kaydet); } else { kaydet(null); }
                                }} className="glass-panel p-5 rounded-[2rem] space-y-4">
                                    <h3 className="text-[10px] text-gray-400 font-black uppercase tracking-widest ml-2">Yeni Kayıt Ekle</h3>
                                    <input name="miktar" type="number" placeholder="Toplam Tutar (₺)" className="w-full bg-black/50 border border-white/10 rounded-2xl p-5 text-xl font-black text-white outline-none focus:border-indigo-500" required />
                                    <input name="aciklama" placeholder="Açıklama (Örn: 2 Kasa Domates)" className="w-full bg-black/50 border border-white/10 rounded-2xl p-4 text-sm font-bold text-white outline-none" />
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="relative"><label className="absolute -top-2 left-4 bg-[#0a0a0b] px-1 text-[8px] font-black text-gray-500">İşlem Tarihi</label><input name="tarih" type="date" className="w-full bg-black/50 border border-white/10 rounded-2xl p-4 text-xs font-bold text-white outline-none" defaultValue={bugun} required /></div>
                                        <div className="relative"><label className="absolute -top-2 left-4 bg-[#0a0a0b] px-1 text-[8px] font-black text-gray-500">Söz/Vade Tarihi</label><input name="vade" type="date" className="w-full bg-black/50 border border-white/10 rounded-2xl p-4 text-xs font-bold text-white outline-none" /></div>
                                    </div>
                                    <label className="bg-white/5 border border-white/10 p-4 rounded-2xl flex items-center justify-center cursor-pointer text-xs font-bold text-gray-400 hover:text-white transition-colors">
                                        <i className="fa-solid fa-camera mr-2"></i> Fatura Ekle (İsteğe Bağlı)
                                        <input type="file" name="foto" accept="image/*" className="hidden" />
                                    </label>
                                    <button type="submit" className={`w-full py-4 rounded-2xl font-black text-xs uppercase tracking-[0.2em] text-white active:scale-95 ${islemTipi === 'borc' ? 'bg-red-600' : 'bg-emerald-600'}`}>KAYDET</button>
                                </form>

                                <div className="space-y-4">
                                    {islemler.filter(i => i.kisiId === seciliKisi.id && i.tip === islemTipi).map(i => (
                                        <div key={i.id} className="glass-panel p-5 rounded-[2rem] relative overflow-hidden">
                                            <div className="flex justify-between items-start mb-2">
                                                <div>
                                                    <p className="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Kalan Tutar</p>
                                                    <p className={`text-2xl font-black ${i.kalan === 0 ? 'text-gray-500 line-through' : (islemTipi === 'borc' ? 'text-red-400' : 'text-emerald-400')}`}>{formatPara(i.kalan)}</p>
                                                    <p className="text-xs text-gray-400 font-bold mt-1">Asıl İşlem: {formatPara(i.miktar)}</p>
                                                </div>
                                                <button onClick={() => { if(confirm('Silmek istiyor musunuz?')) setIslemler(islemler.filter(x => x.id !== i.id)); }} className="w-8 h-8 bg-black/50 text-gray-500 hover:text-red-500 rounded-full flex items-center justify-center"><i className="fa-solid fa-trash-can text-xs"></i></button>
                                            </div>
                                            <p className="text-sm font-bold text-white mt-2 mb-4">{i.aciklama}</p>
                                            
                                            {i.odemeler && i.odemeler.length > 0 && (
                                                <div className="bg-black/30 rounded-xl p-3 mb-4 space-y-2">
                                                    <p className="text-[9px] font-black text-gray-500 uppercase tracking-widest border-b border-white/5 pb-1">Ödeme Geçmişi</p>
                                                    {i.odemeler.map((o, idx) => (
                                                        <div key={idx} className="flex justify-between text-xs text-gray-300 font-bold"><span>{o.tarih}</span><span className="text-emerald-400">-{formatPara(o.miktar)}</span></div>
                                                    ))}
                                                </div>
                                            )}

                                            <div className="flex flex-wrap gap-2 mt-2 pt-4 border-t border-white/5">
                                                {i.kalan > 0 && <button onClick={() => setOdemeModal(i)} className="flex-1 bg-white/10 py-3 rounded-xl text-xs font-black text-white hover:bg-white/20"><i className="fa-solid fa-hand-holding-dollar mr-1"></i> Borç Düş</button>}
                                                <button onClick={() => makbuzPDFIndir(i, seciliKisi.ad)} className="flex-1 bg-indigo-600/20 text-indigo-400 py-3 rounded-xl text-[10px] font-black uppercase"><i className="fa-solid fa-file-pdf mr-1"></i> PDF İndir</button>
                                                <button onClick={() => whatsappGonder(i, seciliKisi.ad)} className="flex-1 bg-green-600/20 text-green-400 py-3 rounded-xl text-[10px] font-black uppercase"><i className="fa-brands fa-whatsapp text-sm mr-1"></i> Gönder</button>
                                                {i.foto && <button onClick={() => setGorselModal(i.foto)} className="w-full mt-2 bg-white/5 py-3 rounded-xl text-[10px] font-black uppercase text-gray-400 hover:text-white"><i className="fa-solid fa-receipt mr-1"></i> Fatura / Görüntü</button>}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {aktifSekme === 'gunluk' && (
                            <div className="space-y-6 fade-in pt-2">
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const baslik = e.target.baslik.value;
                                    const tarih = e.target.tarih.value;
                                    setHatirlaticilar([{ id: Date.now(), baslik, tarih }, ...hatirlaticilar]);
                                    e.target.reset();
                                }} className="glass-panel p-6 rounded-[2.5rem] space-y-4 border-indigo-500/20 bg-indigo-900/10 shadow-lg relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-500/10 rounded-full blur-3xl pointer-events-none"></div>
                                    <h3 className="text-[10px] text-indigo-400 font-black uppercase tracking-[0.2em] ml-2 flex items-center gap-2">
                                        <i className="fa-solid fa-bell text-lg animate-pulse"></i> Yeni Hatırlatıcı / Alarm Kur
                                    </h3>
                                    <input name="baslik" placeholder="Neyi hatırlatayım?" className="w-full bg-black/50 border border-white/10 rounded-[1.5rem] p-5 text-sm font-bold outline-none text-white focus:border-indigo-500" required />
                                    <input name="tarih" type="date" className="w-full bg-black/50 border border-white/10 rounded-[1.5rem] p-5 text-xs font-bold outline-none text-white focus:border-indigo-500 appearance-none" required defaultValue={bugun} />
                                    <button type="submit" className="w-full bg-indigo-600 text-white py-4 rounded-[1.5rem] font-black text-xs uppercase tracking-[0.3em] active:scale-95">ALARM KUR</button>
                                </form>

                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const kazanc = e.target.kazanc.value;
                                    setNotlar([{ id: Date.now(), tarih: bugun, kazanc: Number(kazanc) }, ...notlar]);
                                    e.target.reset();
                                }} className="glass-panel p-6 rounded-[2.5rem] space-y-4 shadow-lg">
                                    <h3 className="text-[10px] text-gray-400 font-black uppercase tracking-widest ml-2 flex items-center gap-2">
                                        <i className="fa-solid fa-calendar-day text-indigo-400"></i> Sadece Kazanç Girişi
                                    </h3>
                                    <div className="relative">
                                        <label className="absolute -top-2 left-4 bg-[#0a0a0b] px-1 text-[8px] font-black text-emerald-500">Günün Net Kazancı (₺)</label>
                                        <input name="kazanc" type="number" placeholder="Örn: 1500" className="w-full bg-emerald-950/20 border border-emerald-500/20 rounded-2xl p-5 text-xl font-black text-emerald-400 outline-none" required />
                                    </div>
                                    <button type="submit" className="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95">KAZANCI KAYDET</button>
                                </form>

                                <div className="glass-panel p-5 rounded-[2.5rem]">
                                    <h3 className="text-[10px] text-gray-400 font-black uppercase tracking-widest mb-4 ml-2">Son 7 Gün Kazanç Grafiği</h3>
                                    <canvas id="kazancGrafik" className="w-full h-48"></canvas>
                                </div>

                                <div className="space-y-4">
                                    {notlar.map(n => (
                                        <div key={n.id} className="glass-panel p-5 rounded-[2rem] relative overflow-hidden flex justify-between items-center">
                                            <div className="absolute left-0 top-0 bottom-0 w-1.5 bg-indigo-500"></div>
                                            <span className="text-[10px] text-gray-400 font-black uppercase tracking-widest ml-4"><i className="fa-regular fa-calendar mr-1"></i> {n.tarih}</span>
                                            <div className="flex items-center gap-4">
                                                <span className="font-black text-emerald-400 text-lg">+{formatPara(n.kazanc)}</span>
                                                <button onClick={() => { if(confirm('Sileyim mi?')) setNotlar(notlar.filter(x => x.id !== n.id)); }} className="text-gray-600 hover:text-red-500"><i className="fa-solid fa-trash-can"></i></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                    </main>

                    {odemeModal && (
                        <div className="fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-5 backdrop-blur-md fade-in">
                            <div className="bg-[#111] border border-white/10 p-6 rounded-[2.5rem] w-full max-w-sm space-y-5">
                                <div className="flex justify-between items-center border-b border-white/5 pb-4">
                                    <h3 className="text-sm font-black text-white uppercase tracking-widest">Borç Düş / Tahsil Et</h3>
                                    <button onClick={() => setOdemeModal(null)} className="text-gray-500 text-xl"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <div className="bg-black/50 p-4 rounded-2xl text-center border border-white/5">
                                    <p className="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-1">Kalan Bakiye</p>
                                    <p className="text-3xl font-black text-white">{formatPara(odemeModal.kalan)}</p>
                                </div>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const odenen = Number(e.target.odenen.value);
                                    if(odenen > odemeModal.kalan) return alert("Kalan tutardan fazla giremezsin!");
                                    const yeniIslemler = islemler.map(i => {
                                        if(i.id === odemeModal.id) {
                                            const yeniOdemeler = [...(i.odemeler || []), { tarih: bugun, miktar: odenen }];
                                            return { ...i, kalan: i.kalan - odenen, odemeler: yeniOdemeler };
                                        }
                                        return i;
                                    });
                                    setIslemler(yeniIslemler);
                                    setOdemeModal(null);
                                }}>
                                    <input name="odenen" type="number" placeholder="Ödenen Tutar (₺)" max={odemeModal.kalan} className="w-full bg-black border border-white/10 rounded-2xl p-5 text-xl font-black text-white outline-none focus:border-emerald-500 mb-4" required autoFocus />
                                    <button type="submit" className="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-[0.2em] active:scale-95">ÖDEMEYİ İŞLE</button>
                                </form>
                            </div>
                        </div>
                    )}

                    <div className="fixed bottom-[100px] left-5 z-[60]">
                        {hesapAcik && (
                            <div className="bg-[#111] border border-white/10 rounded-[2rem] p-4 shadow-2xl mb-4 w-56 fade-in backdrop-blur-3xl">
                                <div className="bg-black p-3 rounded-2xl mb-3 font-mono text-xl text-right text-white h-14 flex items-center justify-end border border-white/5">{hesapEkrani || '0'}</div>
                                <div className="grid grid-cols-4 gap-2">
                                    {['7','8','9','/','4','5','6','*','1','2','3','-','C','0','=','+'].map(k => (
                                        <button key={k} onClick={() => hesaplaTus(k)} className={`h-12 rounded-xl font-black text-sm active:scale-90 ${['C'].includes(k) ? 'bg-red-500 text-white' : ['/','*','-','+','='].includes(k) ? 'bg-indigo-600 text-white' : 'bg-white/10 text-white'}`}>{k}</button>
                                    ))}
                                </div>
                            </div>
                        )}
                        <button onClick={() => setHesapAcik(!hesapAcik)} className="w-14 h-14 bg-indigo-600 rounded-[1.5rem] shadow-2xl flex items-center justify-center text-xl text-white border border-indigo-400/30 active:scale-90">
                            <i className={`fa-solid ${hesapAcik ? 'fa-xmark' : 'fa-calculator'}`}></i>
                        </button>
                    </div>

                    {gorselModal && (
                        <div className="fixed inset-0 bg-black/98 z-[100] flex items-center justify-center p-4 fade-in">
                            <button onClick={() => setGorselModal(null)} className="absolute top-6 right-6 text-white bg-white/10 w-12 h-12 rounded-full flex items-center justify-center text-2xl"><i className="fa-solid fa-xmark"></i></button>
                            <img src={gorselModal} className="max-w-full max-h-[85vh] rounded-[2rem] object-contain border border-white/10" />
                        </div>
                    )}

                    <nav className="fixed bottom-0 left-0 right-0 bg-[#030303]/95 backdrop-blur-xl border-t border-white/5 flex justify-around px-2 py-4 pb-8 z-50">
                        {[
                            { id: 'ozet', icon: 'fa-chart-pie', ad: 'Özet' },
                            { id: 'defter', icon: 'fa-book-open', ad: 'Defter' },
                            { id: 'kisiler', icon: 'fa-store', ad: 'Dükkanlar' },
                            { id: 'gunluk', icon: 'fa-calendar-day', ad: 'Günlük' }
                        ].map(t => (
                            <button key={t.id} onClick={() => { setAktifSekme(t.id); setSeciliKisi(null); setHesapAcik(false); }} className={`flex flex-col items-center gap-1.5 w-16 relative ${aktifSekme === t.id && !seciliKisi ? 'text-indigo-400' : 'text-gray-500'}`}>
                                <i className={`fa-solid ${t.icon} text-xl`}></i>
                                <span className="text-[9px] font-black uppercase tracking-widest">{t.ad}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
