<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saha Pro | Dayı Asistanı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #030303; color: #ffffff; margin: 0; padding-bottom: 90px; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        .slide-down { animation: slideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { 0% { transform: translateY(-100%); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // SENİN GOOGLE CLIENT ID'N BURADA
        const GOOGLE_CLIENT_ID = "210104863698-vpjv76kpgk06mqpfkv1lfuen9f4fule3.apps.googleusercontent.com";

        function App() {
            const [kullanici, setKullanici] = useState(null);
            const [girisYukleniyor, setGirisYukleniyor] = useState(true);
            const [aktifSekme, setAktifSekme] = useState('ozet');
            const [kisiler, setKisiler] = useState([]);
            const [islemler, setIslemler] = useState([]);
            const [notlar, setNotlar] = useState([]);
            const [hatirlaticilar, setHatirlaticilar] = useState([]);
            
            const [seciliKisi, setSeciliKisi] = useState(null);
            const [islemTipi, setIslemTipi] = useState('borc');
            const [hesapAcik, setHesapAcik] = useState(false);
            const [hesapEkrani, setHesapEkrani] = useState('');
            const [gorselModal, setGorselModal] = useState(null);
            const [odemeModal, setOdemeModal] = useState(null);

            const [motivasyon, setMotivasyon] = useState({ goster: false, metin: '' });
            const sozler = [
                "Senin gibi karizma ve vizyonlu biriyle çalışmak harika!",
                "Allah zorluk verdiyse kolaylığını da verir dayı.",
                "Allah işine kolaylık, kasana bereket versin.",
                "Rızkı veren Allah'tır, bugün de işin rast gitsin."
            ];

            const bugun = new Date().toISOString().split('T')[0];

            // Google Giriş Yanıtını İşleme
            const handleCallbackResponse = (response) => {
                const userObject = JSON.parse(atob(response.credential.split(".")[1]));
                setKullanici(userObject);
                setGirisYukleniyor(false);
                // Giriş yapınca motivasyon göster
                const rSoz = sozler[Math.floor(Math.random() * sozler.length)];
                setMotivasyon({ goster: true, metin: rSoz });
                setTimeout(() => setMotivasyon({ goster: false, metin: '' }), 3000);
            };

            useEffect(() => {
                /* global google */
                window.onload = function () {
                    google.accounts.id.initialize({
                        client_id: GOOGLE_CLIENT_ID,
                        callback: handleCallbackResponse
                    });
                    setGirisYukleniyor(false);
                };
            }, []);

            const cikisYap = () => {
                setKullanici(null);
            };
                   useEffect(() => {
                if (!kullanici) return;

                const hazirDukkanlar = Array.from({ length: 120 }, (_, i) => ({
                    id: 'dukkan_' + (i + 1),
                    ad: `Hal No: ${i + 1}`,
                    sabit: true
                }));

                // Kullanıcının e-postasına göre verileri ayırıyoruz (Güvenlik için)
                const userPrefix = kullanici.email ? `_${btoa(kullanici.email).slice(0, 10)}` : '';
                const k = localStorage.getItem(`saha_kisiler_final${userPrefix}`);
                const i = localStorage.getItem(`saha_islemler_final${userPrefix}`);
                const n = localStorage.getItem(`saha_notlar_final${userPrefix}`);
                const h = localStorage.getItem(`saha_hatirlaticilar_final${userPrefix}`);
                
                if(k) setKisiler(JSON.parse(k)); else setKisiler(hazirDukkanlar);
                if(i) setIslemler(JSON.parse(i));
                if(n) setNotlar(JSON.parse(n));
                if(h) setHatirlaticilar(JSON.parse(h));
            }, [kullanici]);

            useEffect(() => {
                if (!kullanici) return;
                const userPrefix = kullanici.email ? `_${btoa(kullanici.email).slice(0, 10)}` : '';
                if(kisiler.length > 0) localStorage.setItem(`saha_kisiler_final${userPrefix}`, JSON.stringify(kisiler));
                localStorage.setItem(`saha_islemler_final${userPrefix}`, JSON.stringify(islemler));
                localStorage.setItem(`saha_notlar_final${userPrefix}`, JSON.stringify(notlar));
                localStorage.setItem(`saha_hatirlaticilar_final${userPrefix}`, JSON.stringify(hatirlaticilar));
            }, [kisiler, islemler, notlar, hatirlaticilar, kullanici]);

            useEffect(() => {
                if ('Notification' in window && Notification.permission === 'granted' && kullanici) {
                    const simdi = new Date().getTime();
                    islemler.forEach(islem => {
                        if (islem.kalan > 0 && islem.vade) {
                            const vadeZamani = new Date(islem.vade).getTime();
                            const farkGun = Math.ceil((vadeZamani - simdi) / (1000 * 60 * 60 * 24));
                            if (farkGun <= 7 && farkGun >= 0) {
                                const anahtar = `uyari_${islem.id}_${farkGun}`;
                                if (!localStorage.getItem(anahtar)) {
                                    const dukkan = kisiler.find(k => k.id === islem.kisiId)?.ad || 'Bilinmeyen';
                                    new Notification("Saha Pro Hatırlatıcı", {
                                        body: `${dukkan} dükkanı ödemesi için ${farkGun} gün kaldı! Tutar: ${islem.kalan} TL`
                                    });
                                    localStorage.setItem(anahtar, 'true');
                                }
                            }
                        }
                    });
                }
            }, [islemler, kisiler, kullanici]);

            useEffect(() => {
                if (aktifSekme === 'gunluk' && kullanici) {
                    const ctx = document.getElementById('kazancGrafik');
                    if (ctx) {
                        if (window.kazancChart) window.kazancChart.destroy();
                        const grafikVeri = [...notlar].reverse().slice(-7);
                        window.kazancChart = new Chart(ctx, {
                            type: 'line',
                            data: {
                                labels: grafikVeri.map(n => n.tarih.slice(5)),
                                datasets: [{
                                    label: 'Günlük Kazanç',
                                    data: grafikVeri.map(n => Number(n.kazanc)),
                                    borderColor: '#10b981',
                                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                                    borderWidth: 3,
                                    tension: 0.4,
                                    fill: true
                                }]
                            },
                            options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } } } }
                        });
                    }
                }
            }, [aktifSekme, notlar, kullanici]);
                       const formatPara = (tutar) => new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY' }).format(tutar);

            const makbuzPDFIndir = (islem, dukkanAd) => {
                const element = document.createElement('div');
                element.innerHTML = `
                    <div style="padding: 30px; font-family: Arial, sans-serif; color: black; background: white; width: 400px; border: 2px solid #333; border-radius: 10px;">
                        <h1 style="text-align: center; color: #4f46e5; margin-bottom: 5px;">SAHA PRO TİCARİ</h1>
                        <p style="text-align: center; font-size: 14px; color: gray; margin-top: 0;">Resmi Olmayan Bilgi Makbuzu</p>
                        <hr style="margin: 20px 0; border: 1px solid #ccc;">
                        <p style="font-size: 16px;"><strong>İşlem Tarihi:</strong> ${islem.tarih}</p>
                        <p style="font-size: 16px;"><strong>Firma / Dükkan:</strong> ${dukkanAd}</p>
                        <p style="font-size: 16px;"><strong>İşlem Türü:</strong> ${islem.tip === 'borc' ? 'Borç / Alınan Mal' : 'Alacak / Verilen Mal'}</p>
                        <p style="font-size: 16px;"><strong>Açıklama:</strong> ${islem.aciklama || 'Belirtilmedi'}</p>
                        <hr style="margin: 20px 0; border: 1px solid #ccc;">
                        <h2 style="text-align: right; color: ${islem.tip === 'borc' ? '#dc2626' : '#16a34a'};">Asıl Tutar: ${formatPara(islem.miktar)}</h2>
                        <h2 style="text-align: right; color: #333;">Kalan Bakiye: ${formatPara(islem.kalan)}</h2>
                        <p style="text-align: center; font-size: 10px; margin-top: 40px; color: #888;">Bu makbuz dijital asistan tarafından otomatik oluşturulmuştur.</p>
                    </div>
                `;
                html2pdf().set({ margin: 1, filename: `Makbuz_${dukkanAd}_${islem.tarih}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a5', orientation: 'portrait' } }).from(element).save();
            };

            const whatsappGonder = (islem, dukkanAd) => {
                const metin = `*SAHA PRO BİLGİLENDİRME*%0A%0A*Firma:* ${dukkanAd}%0A*Tarih:* ${islem.tarih}%0A*İşlem:* ${islem.tip === 'borc' ? 'Borç' : 'Alacak'}%0A*Açıklama:* ${islem.aciklama || '-'}%0A*Asıl Tutar:* ${islem.miktar} TL%0A*Kalan Bakiye:* ${islem.kalan} TL%0A%0A_Sistem tarafından otomatik gönderilmiştir._`;
                window.open(`https://wa.me/?text=${metin}`, '_blank');
            };

            const fotografYukle = (e, callback) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = () => callback(reader.result);
                reader.readAsDataURL(file);
            };

            const hesaplaTus = (t) => {
                if(t === 'C') setHesapEkrani('');
                else if(t === '=') { try { setHesapEkrani(eval(hesapEkrani).toString()); } catch { setHesapEkrani('Hata'); } }
                else setHesapEkrani(hesapEkrani + t);
            };

            // YÜKLENİYOR EKRANI
            if (girisYukleniyor) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-[#030303] fade-in">
                        <div className="relative">
                            <div className="w-24 h-24 border-4 border-indigo-500/20 border-t-indigo-500 rounded-full animate-spin"></div>
                            <i className="fa-solid fa-shield-halved text-2xl text-indigo-500 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></i>
                        </div>
                        <h1 className="text-3xl font-black italic uppercase tracking-tighter mt-8 text-white animate-pulse">Saha Pro</h1>
                        <p className="text-[10px] text-gray-500 font-bold uppercase tracking-[0.4em] mt-2">Sistem Yükleniyor...</p>
                    </div>
                );
            }

            // GOOGLE GİRİŞ EKRANI
            if (!kullanici) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden fade-in bg-[#030303]">
                        <div className="absolute top-1/4 -left-10 w-64 h-64 bg-indigo-600/30 rounded-full blur-3xl"></div>
                        <div className="absolute bottom-1/4 -right-10 w-64 h-64 bg-emerald-600/20 rounded-full blur-3xl"></div>
                        
                        <div className="glass-panel p-10 rounded-[3.5rem] w-full max-w-sm text-center relative z-10 shadow-2xl border border-white/10">
                            <div className="w-20 h-20 bg-indigo-600/20 rounded-full flex items-center justify-center mx-auto mb-6 border border-indigo-500/30">
                                <i className="fa-solid fa-shield-halved text-3xl text-indigo-400"></i>
                            </div>
                            <h1 className="text-4xl font-black italic uppercase tracking-tighter mb-2 text-white">Saha Pro</h1>
                            <p className="text-[10px] text-gray-500 font-black uppercase tracking-[0.3em] mb-10">Dayı Asistanı v2.0</p>
                            
                            <div className="flex justify-center" id="googleBtnContainer">
                                {/* Google butonu buraya render edilecek */}
                                {useEffect(() => {
                                    if (!kullanici) {
                                        google.accounts.id.renderButton(
                                            document.getElementById("googleBtnContainer"),
                                            { theme: "filled_blue", size: "large", shape: "pill", width: "250" }
                                        );
                                    }
                                }, [])}
                            </div>
                            <p className="text-[9px] text-gray-600 font-bold mt-8 uppercase tracking-widest">Güvenli Şifreleme Aktif</p>
                        </div>
                    </div>
                );
            }

            // ANA UYGULAMA HESAPLAMALARI
            const aktifBorclar = islemler.filter(i => i.tip === 'borc' && i.kalan > 0);
            const aktifAlacaklar = islemler.filter(i => i.tip === 'alacak' && i.kalan > 0);
            const toplamBorc = aktifBorclar.reduce((a,b) => a + Number(b.kalan), 0);
            const toplamAlacak = aktifAlacaklar.reduce((a,b) => a + Number(b.kalan), 0);
            const aktifAlarmlar = hatirlaticilar.filter(h => h.tarih <= bugun);

            return (
                <div className="min-h-screen relative overflow-hidden">
                    {/* Motivasyon Mesajı */}
                    {motivasyon.goster && (
                        <div className="fixed top-0 left-0 right-0 bg-emerald-600 text-white z-[999] p-6 text-center slide-down shadow-2xl">
                            <p className="font-black text-sm uppercase tracking-widest">{motivasyon.metin}</p>
                        </div>
                    )}

                    <header className="px-6 py-6 border-b border-white/5 sticky top-0 bg-[#030303]/90 backdrop-blur-xl z-40 flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-black text-indigo-500 italic uppercase tracking-tighter">Saha Pro</h1>
                            <p className="text-[9px] text-gray-500 font-bold uppercase tracking-[0.3em] mt-1">Hoşgeldin, {kullanici.name.split(' ')[0]}</p>
                        </div>
                        <button onClick={cikisYap} className="w-10 h-10 bg-red-500/10 rounded-full flex items-center justify-center border border-red-500/20 active:scale-90">
                            <i className="fa-solid fa-power-off text-red-500"></i>
                        </button>
                    </header>
                                        <main className="p-5 space-y-6 relative z-10">
                        {aktifSekme === 'ozet' && (
                            <div className="space-y-6 fade-in pt-2">
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="glass-panel p-6 rounded-[2rem] relative overflow-hidden">
                                        <div className="absolute -top-10 -right-10 w-24 h-24 bg-red-500/20 rounded-full blur-2xl"></div>
                                        <i className="fa-solid fa-arrow-up-right-dots text-red-500 text-3xl mb-3"></i>
                                        <p className="text-[10px] text-gray-400 font-black uppercase tracking-widest">Kalan Borcum</p>
                                        <p className="text-xl font-black text-white mt-1">{formatPara(toplamBorc)}</p>
                                    </div>
                                    <div className="glass-panel p-6 rounded-[2rem] relative overflow-hidden">
                                        <div className="absolute -top-10 -right-10 w-24 h-24 bg-emerald-500/20 rounded-full blur-2xl"></div>
                                        <i className="fa-solid fa-arrow-down-to-line text-emerald-500 text-3xl mb-3"></i>
                                        <p className="text-[10px] text-gray-400 font-black uppercase tracking-widest">Kalan Alacağım</p>
                                        <p className="text-xl font-black text-white mt-1">{formatPara(toplamAlacak)}</p>
                                    </div>
                                </div>

                                {aktifAlarmlar.length > 0 && (
                                    <div className="bg-indigo-500/10 border border-indigo-500/30 p-5 rounded-[2rem]">
                                        <h3 className="text-indigo-400 font-black text-xs uppercase tracking-widest mb-4 flex items-center gap-2"><i className="fa-solid fa-bell animate-pulse"></i> Hatırlatmalar</h3>
                                        <div className="space-y-3">
                                            {aktifAlarmlar.map(h => (
                                                <div key={h.id} className="bg-black/50 p-4 rounded-2xl border border-white/5 flex justify-between items-center">
                                                    <span className="font-bold text-white text-sm">{h.baslik}</span>
                                                    <button onClick={() => setHatirlaticilar(hatirlaticilar.filter(x => x.id !== h.id))} className="w-8 h-8 bg-indigo-500/20 text-indigo-400 rounded-full flex items-center justify-center"><i className="fa-solid fa-check text-xs"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                
                                <button onClick={() => setAktifSekme('defter')} className="w-full glass-panel p-6 rounded-[2rem] flex items-center justify-between group active:scale-95 transition-all">
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 bg-indigo-500/20 rounded-full flex items-center justify-center border border-indigo-500/30"><i className="fa-solid fa-book-open text-indigo-400 text-xl"></i></div>
                                        <div className="text-left">
                                            <h3 className="text-white font-black text-lg uppercase tracking-tighter">Detaylı Defter</h3>
                                            <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">Tüm hesap dökümü</p>
                                        </div>
                                    </div>
                                    <i className="fa-solid fa-chevron-right text-gray-500"></i>
                                </button>
                            </div>
                        )}

                        {aktifSekme === 'defter' && (
                            <div className="space-y-6 fade-in pt-2">
                                <div className="flex justify-between items-center glass-panel p-4 rounded-[1.5rem]">
                                    <button onClick={() => setAktifSekme('ozet')} className="text-[10px] font-black text-gray-400 uppercase tracking-widest bg-black/50 px-4 py-2 rounded-xl border border-white/5"><i className="fa-solid fa-chevron-left mr-2"></i> Geri</button>
                                    <h2 className="text-lg font-black text-white uppercase tracking-tighter">Defter Listesi</h2>
                                </div>

                                <div className="space-y-6">
                                    <div className="glass-panel p-5 rounded-[2.5rem] border-red-500/20 relative overflow-hidden">
                                        <h3 className="text-xs font-black text-red-500 uppercase tracking-widest mb-4 flex items-center gap-2"><i className="fa-solid fa-hand-holding-dollar"></i> Ödemem Gerekenler</h3>
                                        <div className="space-y-3 relative z-10">
                                            {aktifBorclar.map(i => {
                                                const dukkan = kisiler.find(k => k.id === i.kisiId);
                                                return (
                                                    <div key={i.id} onClick={() => {setSeciliKisi(dukkan); setAktifSekme('kisiler'); setIslemTipi('borc');}} className="bg-black/50 p-5 rounded-2xl border border-white/5 flex justify-between items-center active:bg-white/5 transition-colors">
                                                        <div>
                                                            <p className="font-black text-white text-sm uppercase">{dukkan?.ad}</p>
                                                            <p className="text-[9px] text-gray-500 font-bold uppercase mt-1">Söz: {i.vade || 'Yok'}</p>
                                                        </div>
                                                        <span className="font-black text-red-400 text-lg">{formatPara(i.kalan)}</span>
                                                    </div>
                                                );
                                            })}
                                            {aktifBorclar.length === 0 && <p className="text-[10px] text-gray-600 font-bold uppercase py-4 text-center italic tracking-widest">Borç kaydı bulunmuyor.</p>}
                                        </div>
                                    </div>

                                    <div className="glass-panel p-5 rounded-[2.5rem] border-emerald-500/20 relative overflow-hidden">
                                        <h3 className="text-xs font-black text-emerald-500 uppercase tracking-widest mb-4 flex items-center gap-2"><i className="fa-solid fa-sack-dollar"></i> Alacaklarım</h3>
                                        <div className="space-y-3 relative z-10">
                                            {aktifAlacaklar.map(i => {
                                                const dukkan = kisiler.find(k => k.id === i.kisiId);
                                                return (
                                                    <div key={i.id} onClick={() => {setSeciliKisi(dukkan); setAktifSekme('kisiler'); setIslemTipi('alacak');}} className="bg-black/50 p-5 rounded-2xl border border-white/5 flex justify-between items-center active:bg-white/5 transition-colors">
                                                        <div>
                                                            <p className="font-black text-white text-sm uppercase">{dukkan?.ad}</p>
                                                            <p className="text-[9px] text-gray-500 font-bold uppercase mt-1">Söz: {i.vade || 'Yok'}</p>
                                                        </div>
                                                        <span className="font-black text-emerald-400 text-lg">{formatPara(i.kalan)}</span>
                                                    </div>
                                                );
                                            })}
                                            {aktifAlacaklar.length === 0 && <p className="text-[10px] text-gray-600 font-bold uppercase py-4 text-center italic tracking-widest">Alacak kaydı bulunmuyor.</p>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {aktifSekme === 'kisiler' && !seciliKisi && (
                            <div className="space-y-6 fade-in pt-2">
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const ad = e.target.ad.value;
                                    setKisiler([{ id: Date.now(), ad, sabit: false }, ...kisiler]);
                                    e.target.reset();
                                }} className="glass-panel p-5 rounded-[2rem] flex gap-3 border-white/10 shadow-inner">
                                    <input name="ad" placeholder="Dükkan / Kişi Ekle" className="w-full bg-black/50 border border-white/10 rounded-2xl p-4 text-sm font-black outline-none text-white focus:border-indigo-500 tracking-tight" required />
                                    <button type="submit" className="bg-indigo-600 text-white px-6 rounded-2xl font-black active:scale-95 shadow-[0_0_20px_rgba(79,70,229,0.3)]"><i className="fa-solid fa-plus"></i></button>
                                </form>

                                <div className="space-y-3">
                                    {kisiler.map(k => {
                                        const kisiBorc = islemler.filter(i => i.kisiId === k.id && i.tip === 'borc').reduce((a,b) => a + Number(b.kalan), 0);
                                        const kisiAlacak = islemler.filter(i => i.kisiId === k.id && i.tip === 'alacak').reduce((a,b) => a + Number(b.kalan), 0);
                                        return (
                                            <div key={k.id} onClick={() => setSeciliKisi(k)} className="glass-panel p-5 rounded-[2rem] flex justify-between items-center cursor-pointer hover:bg-white/5 group shadow-lg">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-12 h-12 bg-black/50 rounded-full flex items-center justify-center border border-white/5 shadow-inner"><i className="fa-solid fa-store text-gray-400 group-hover:text-indigo-400 transition-colors"></i></div>
